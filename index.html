<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pa' Que Te Arda – Gomitas Picantes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ░░ NAVBAR ░░ -->
  <nav>
    <!-- Hamburguesa (solo móvil, izquierda) -->
    <button class="nav-hamburger" id="navHamburger" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>

    <a href="index.html" class="nav-logo">
      <img src="logo.jpeg" alt="Pa' Que Te Arda" />
    </a>

    <ul class="nav-links" id="navLinks">
      <li><a href="#productos" class="active">PRODUCTOS</a></li>
      <li><a href="#arma-tu-mix">ARMA TU MIX</a></li>
      <li><a href="#contacto">CONTACTO</a></li>
    </ul>

    <!-- Carrito ícono -->
    <button class="nav-cart" id="navCartBtn" aria-label="Ver carrito">
      🛒
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </nav>

  <div class="carrito-overlay" id="carritoOverlay"></div>

    <div class="carrito-drawer-header">
      <h2>🛒 TU CARRITO</h2>
      <button class="carrito-close" id="carritoClose">✕</button>
    </div>

    <div class="carrito-drawer-body" id="carritoDrawerBody">
      <div id="carritoVacio" class="carrito-vacio">
        <p>Tu carrito está vacío 🔥</p>
      </div>
      <div id="carritoItems" class="carrito-items" style="display:none;"></div>
    </div>

    <div class="carrito-drawer-footer" id="carritoFooter" style="display:none;">
      <div class="carrito-total">
        TOTAL: <span id="carritoTotalItems">0</span> producto(s)
      </div>
      <button class="btn-pedido" id="btnPedidoCarrito">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

      </button>
    </div>
  </aside>

  <!-- ░░ MAIN CONTENT ░░ -->
  <main>

    <!-- ── 1. LAS ORIGINALES ── -->
    <section class="productos-section" id="productos">
      <h2 class="section-title">
        <span class="num"></span> LAS ORIGINALES
      </h2>

      <div class="productos-grid">

        <!-- Producto 1 -->
        <div class="producto-card">
          <img src="producto 1.jpeg" alt="Oro Picante" />
          <span class="producto-nombre">MinaChips</span>
          <span class="producto-desc"> Sabor Natural</span>
          <button class="btn-agregar" data-nombre="minachips" data-img="producto 1.jpeg">AGREGAR AL CARRITO</button>
        </div>

        <!-- Producto 2 -->
        <div class="producto-card">
          <img src="producto 2.jpeg" alt="Red On" />
          <span class="producto-nombre">MinaChips</span>
          <span class="producto-desc">Gokher Gatch</span>
          <button class="btn-agregar" data-nombre="MinaChipS" data-img="producto 2.jpeg">AGREGAR AL CARRITO</button>
        </div>

        <!-- Producto 3 -->
        <div class="producto-card">
          <img src="producto 3.jpeg" alt="Azul Infernal" />
          <span class="producto-nombre">MinaChips</span>
          <span class="producto-desc">Chile</span>
          <button class="btn-agregar" data-nombre="minaChips" data-img="producto 3.jpeg">AGREGAR AL CARRITO</button>
        </div>

        <!-- Producto 4 -->
        <div class="producto-card">
          <img src="producto 4.jpeg" alt="Fire Gray" />
          <span class="producto-nombre">MinaChips</span>
          <span class="producto-desc"> Sabor Ácido</span>
          <button class="btn-agregar" data-nombre="Minachips" data-img="producto 4.jpeg">AGREGAR AL CARRITO</button>
        </div>

        <!-- Producto 5 -->
        <div class="producto-card">
          <img src="producto 5.jpeg" alt="MinaChips" />
          <span class="producto-nombre">MinaChips</span>
          <span class="producto-desc"> Sabor Original</span>
          <button class="btn-agregar" data-nombre="MinaChips" data-img="producto 5.jpeg">AGREGAR AL CARRITO</button>
        </div>

      </div>
    </section>

    <!-- ── 2. ARMA TU MIX ── -->
    <section id="arma-tu-mix">
      <h2 class="section-title">
        <span class="num"></span> ARMA TU MIX 🔥
      </h2>

      <div class="mix-section">
        <div class="mix-cauldron">
          <img src="caldera-transparente.png" alt="Caldero" />
        </div>

        <div class="mix-form-area">
          <textarea
            id="mixMensaje"
            class="mix-textarea"
            placeholder="Escribe tu mensaje"
            maxlength="200"
          ></textarea>
          <span class="char-count" id="charCount">0/200</span>

          <button class="btn-pedido" id="btnPedido">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

      </div>

      <a href="#" class="footer-icon" title="Sitio web">🌐</a>

  </footer>

</html>
